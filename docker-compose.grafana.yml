# Grafana-specific docker-compose override
# Use with: docker compose -f docker-compose.yml -f docker-compose.grafana.yml up

services:
  grafana:
    environment:
      # Additional Grafana configuration
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_SECRET_KEY=changeme-in-production
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      # Dashboard and datasource provisioning
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_PATHS_DATA=/var/lib/grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    # Network configuration for accessing host services
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Optional: Use host network mode for easier access to host services
    # network_mode: host  # Uncomment if host.docker.internal doesn't work

  prometheus:
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Optional: Use host network mode
    # network_mode: host  # Uncomment if host.docker.internal doesn't work

