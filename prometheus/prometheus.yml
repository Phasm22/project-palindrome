global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'palindrome-pce'
    environment: 'development'

scrape_configs:
  - job_name: 'pce-api'
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          service: 'pce-api'
          component: 'api-server'
    metrics_path: '/metrics'
    params:
      format: ['prometheus']
    scrape_interval: 15s
    scrape_timeout: 10s

