# Project Palindrome — Topology
# Infrastructure topology definition

networks:
  home:
    cidr: "192.168.68.0/22"
    gateway: "192.168.68.1"
    vlan: 1

  lab:
    cidr: "172.16.0.0/22"
    vlan: 50
    gateway: "172.16.0.1"

vpn:
  # WireGuard VPN configuration
  wireguard:
    cidr: "10.16.0.0/24"
    server: "172.16.0.1" # OPNsense IP (wg0)
    dns: "172.16.0.13" # Lab Pi-hole IP

hosts:
  - name: "opnsense_gw"
    role: "firewall/router"
    ip: "172.16.0.1"
    network: "lab"
    os: "opnsense"

  - name: "piholelab"
    role: "dns/pihole"
    ip: "172.16.0.13"
    network: "lab"

  - name: "proxBig"
    role: "proxmox_node"
    ip: "172.16.0.10"
    network: "lab"
    os: "proxmox_ve"

  - name: "yin"
    role: "proxmox_node"
    ip: "172.16.0.11"
    network: "lab"
    os: "proxmox_ve"

  - name: "yang"
    role: "proxmox_node"
    ip: "172.16.0.12"
    network: "lab"
    os: "proxmox_ve"

  - name: "code-server"
    role: "lxc"
    ip: "172.16.0.106"
    network: "lab"
    status: "running"

  - name: "homebridge"
    role: "lxc"
    ip: "192.168.68.79"
    network: "home"
    os: "debian"

  - name: "home_dns"
    role: "dns/pihole"
    ip: "192.168.71.25"
    network: "home"

  - name: "ubuntu_srv"
    role: "server/dns_backup"
    ip: "192.168.71.30"
    network: "home"
    os: "ubuntu"

  - name: "vpn"
    role: "vpn"
    ip: "192.168.71.40"
    network: "home"

  - name: "tj-tp-switch"
    role: "switch"
    network: "home"
    status: "unverified"
    # Declared only. This is the managed 8-port TP-Link switch between the
    # home router and the Cisco 2960G (`switch:` block below) — a different
    # physical device. Its config.cfg export is a proprietary binary format
    # with no machine-readable structure beyond its hostname ("TJ-TP-Switch")
    # and one VLAN name ("uplinkHome"); no automated ingestion path exists
    # yet without live SNMP/CLI access to the switch itself.
    #
    # Per TJ (2026-07-21): the one thing worth knowing about this switch is
    # its downlink to the lab (the 2960G) — VLAN 40, UNTAGGED. Deliberate,
    # not an oversight: tagging it caused the TP-Link Deco home router to
    # stop routing traffic entirely, so it was reverted to untagged as a
    # workaround. Not modeled as a graph fact (no ingestion path exists for
    # this device), but keep this in mind if that link ever looks "wrong."

containers:
  - name: "lab_pihole"
    type: "lxc"
    host: "yin"
    image: "pihole/pihole:latest"
    status: "running"

  - name: "home_pihole"
    type: "docker"
    host: "ubuntu_srv"
    image: "pihole/pihole:latest"
    status: "running"

services:
  - name: "dns_lab"
    port: 53
    protocol: "udp"
    host: "lab_pihole"
    status: "running"

  - name: "dns_home"
    port: 53
    protocol: "udp"
    host: "home_dns"
    status: "running"

  - name: "wireguard"
    port: 51820
    protocol: "udp"
    host: "opnsense_gw"
    status: "running"

  - name: "proxBig"
    port: 8006
    protocol: "tcp"
    host: "proxBig"
    status: "running"

dependencies:
  # Dependencies between services or hosts
  # Format: source depends on target
  # 
  # NOTE: Most dependencies can be auto-inferred from 'host' fields:
  #   - Containers automatically depend on their host (e.g., lab_pihole -> yin from containers[].host)
  #   - Services automatically depend on their host (e.g., wireguard -> opnsense_gw from services[].host)
  #   - VMs/containers that host other services depend on their hypervisor (e.g., opnsense_gw VM -> proxBig)
  # 
  # Only explicit dependencies that can't be inferred from the structure should be listed here.
  # For example, if opnsense_gw is a VM on proxBig, that dependency should be listed.
  
  # OPNsense is a VM running on proxBig
  opnsense_on_proxbig:
    source: "opnsense_gw"
    target: "proxBig"
    type: "host_dependency"
  
  # WireGuard service runs on OPNsense (auto-inferred from services[].host, but listed for clarity)
  wireguard_on_opnsense:
    source: "wireguard"
    target: "opnsense_gw"
    type: "service_on_host"
  
  # lab_pihole container runs on yin node (auto-inferred from containers[].host)
  # home_pihole container runs on ubuntu_srv (auto-inferred from containers[].host)
  # Services depend on their hosts (auto-inferred from services[].host)

# Optional: Switch/network hardware
# This declared block is hand-maintained and known to disagree with the
# switch's real running-config (see docs/network/2960g-running-config-*.txt,
# parsed by src/parsers/network/cisco-ios-switch-parser.ts) in two ways:
#  - No port on this switch is actually trunking. Gi0/33 and Gi0/34 (declared
#    below as the trunk) are plain single-VLAN access ports, same as every
#    other port in that Gi0/33-48 bank. TJ confirmed the FUNCTIONAL behavior
#    this was meant to capture still holds, though: all 16 ports in that
#    bank are `switchport access vlan 40`, and VLAN 40's SVI is L3-routed
#    (default route) to the home gateway 192.168.68.1 — so anything plugged
#    into that bank does reach home, just via 16 individual access ports
#    rather than a multi-VLAN trunk.
#  - The lab subnet (172.16.0.0/22) rides the switch's untagged default
#    VLAN 1, not VLAN 50 as declared here.
# Both the declared and observed facts are ingested and kept side by side
# (see SwitchIngestionOrchestrator) rather than one silently overwriting the
# other — this block is intentionally left as originally written so that
# disagreement stays visible.
switch:
  model: "Cisco 2960G"
  trunk_ports:
    - "Gi0/33"
    - "Gi0/34"
  vlans:
    - 1
    - 40
    - 50
  ip:
    - "172.16.0.9"
    - "192.168.71.6"
