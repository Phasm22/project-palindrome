# Pre-approved SSH commands by host
# Commands are organized by hostname/IP and categorized by purpose

hosts:
  # OPNsense firewall (lab)
  # Note: OPNsense uses an interactive menu system. SSH connections automatically
  # select option 8 (shell) to access the command line.
  "172.16.0.1":
    hostname: "172.16.0.1"
    aliases:
      - "opnsense"
      - "radar"
      - "firewall"
      - "opnsense.prox"
      - "OPNsense.prox"
    description: "OPNsense firewall in lab network"
    read_only: true
    commands:
      filesystem:
        - "du -sh /*"
        - "df -h"
        - "du -h --max-depth=1 /var/log"
        - "du -h --max-depth=1 /var"
        - "du -h --max-depth=2 /var"
        - "du -h --max-depth=1 /usr"
        - "du -h --max-depth=2 /usr"
        - "find /var -type f -size +100M 2>/dev/null"
        - "find /usr -type f -size +100M 2>/dev/null"
        - "ls -lh /var/log | head -20"
        - "du -sh /var/*"
        - "du -sh /usr/*"
      system:
        - "uptime"
        - "free -h"
        - "ps aux | head -20"
      firewall:
        - "pfctl -sr"
        - "pfctl -sn"
        - "pfctl -si"
        - "pfctl -sa"
      dhcp:
        - "cat /var/dhcpd/var/db/dhcpd.leases"
        - "cat /var/db/dhcpd.leases"
        - "find /var -name '*dhcp*' -type f 2>/dev/null | head -20"
        
  "172.16.0.10":  # prox_big
    hostname: "172.16.0.10"
    aliases:
      - "prox_big"
      - "proxbig"
      - "prox_big.prox"
      - "proxbig.prox"
    description: "Proxmox node - prox_big (OS-level operations only, use Proxmox tool for VM operations)"
    username: "opsadmin"
    read_only: true
    commands:
      network:
        # OS-level network diagnostics (not VM-level)
        - "ip addr show"
        - "ip route show"
        - "netstat -tuln"
        - "ss -tuln"
        - "ip link show"
        - "bridge link show"
      system:
        - "uptime"
        - "free -h"
        - "hostname"
        - "uname -a"
        - "df -h"
        - "sensors"
        - "sensors -j"
        - "systemctl status {service}"
        - "systemctl list-units --type=service"
        - "journalctl -u {service} -n 50"
        - "tail -n 100 /var/log/{logfile}"
        - "ps aux | head -20"
      proxmox:
        - "pvesh get /nodes/{node}/qemu"
        - "pvesh get /nodes/{node}/lxc"
        - "pvesh get /nodes/{node}/status"
        - "pvesh get /nodes/{node}/qemu --output-format json"
        - "pvesh get /nodes/{node}/lxc --output-format json"
        - "pvesh get /nodes/{node}/status --output-format json"
      maintenance:
        - "apt update"
        - "apt list --upgradable"
        - "systemctl restart {service}"
        - "systemctl stop {service}"
        - "systemctl start {service}"
      filesystem:
        - "du -sh /*"
        - "df -h"
        - "du -h --max-depth=1 /var/log"
        - "ls -lh /var/log | head -20"
        
