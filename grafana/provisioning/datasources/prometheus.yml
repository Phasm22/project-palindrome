apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Prometheus scrapes metrics from PCE API and provides query API for Grafana
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: GET
      queryTimeout: 60s
      timeInterval: 15s
    editable: true
    # Prometheus is configured to scrape from PCE API at host.docker.internal:4000/metrics?format=prometheus

