# Dev-lite overlay: reduced memory for on-demand use alongside desktop apps.
services:
  neo4j:
    environment:
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=2G
    deploy:
      resources:
        limits:
          memory: "4g"
        reservations:
          memory: "2g"

  qdrant:
    deploy:
      resources:
        limits:
          memory: "2g"
        reservations:
          memory: "1g"

  ollama:
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
